[potential]
family = "analytical"
form = "double_morse"
backend = "numpy"
cutoff = 8.0

# Built-in analytical forms keep the parameter order fixed by the registry.
# This example uses the default double-Morse parameter names:
#   E1, a1, r1, E2, a2, r2, delta
initial = [0.03, 5.0, 2.75, 0.01, 2.0, 3.50, 0.0]
