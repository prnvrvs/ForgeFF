name: Download distribution artifacts
description: Download sdist and wheel artifacts for publishing
runs:
  using: composite
  steps:
    - name: Download sdist
      uses: actions/download-artifact@v8
      with:
        name: forgeff-sdist
        path: dist
    - name: Download Ubuntu wheels
      uses: actions/download-artifact@v8
      with:
        name: forgeff-ubuntu-latest
        path: dist
    - name: Download ARM macOS wheels
      uses: actions/download-artifact@v8
      with:
        name: forgeff-macos-latest
        path: dist
    - name: Download Intel macOS wheels
      uses: actions/download-artifact@v8
      with:
        name: forgeff-macos-15-intel
        path: dist
