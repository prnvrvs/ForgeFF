name: Download distribution artifacts
description: Download sdist and wheel artifacts for publishing
runs:
  using: composite
  steps:
    - name: Download sdist
      uses: actions/download-artifact@v8
      with:
        name: forgeff-sdist
        path: dist
    - name: Download wheel
      uses: actions/download-artifact@v8
      with:
        name: forgeff-wheel
        path: dist
