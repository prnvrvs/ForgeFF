name: Build sdist and wheels
on:
  push:
    branches:
      - "*"
    tags:
      - "*"
  pull_request:
    branches:
      - "*"
jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pypa/build
        run: python -m pip install build
      - name: Build source distribution
        run: python -m build --sdist --outdir dist .
      - name: Upload sdist as artifact
        uses: actions/upload-artifact@v7
        with:
          name: motep-sdist
          path: dist/*.tar.gz
          retention-days: 5
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - macos-15-intel
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel
      - name: Build wheels
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux*"
          CIBW_TEST_COMMAND: >-
            python -c "from motep.potentials.mtp.cext import _mtp_cext"
        run: python -m cibuildwheel --output-dir dist
      - name: Upload built wheels as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: motep-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 5
  test_built_wheels:
    name: Test built wheels on ${{ matrix.os }} / numpy=${{ matrix.numpy }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - macos-15-intel
        numpy:
          - "==1.23.5"
          - ">=2,<3"
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: tests
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Download built wheels
        uses: actions/download-artifact@v8
        with:
          name: motep-${{ matrix.os }}
          path: dist
      - name: Install runtime NumPy and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy${{ matrix.numpy }}" --only-binary=numba ase scipy numba jax pytest
      - name: Install built wheel
        run: python -m pip install --no-deps dist/*cp311*.whl
      - name: Run pytest
        run: |
          python -m pytest -v tests/potentials/mtp/test_engines.py
  publish_testpypi:
    name: Publish Python 🐍 distributions 📦 to TestPyPI
    needs: [build_sdist, build_wheels, test_built_wheels]
    if: github.repository == 'imw-md/motep' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/project/motep/
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/download-dist-artifacts
      - name: Publish distribution 📦 to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
  publish_pypi:
    name: Publish Python 🐍 distributions 📦 to PyPI
    needs: [publish_testpypi]
    if: github.repository == 'imw-md/motep' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/motep/
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/download-dist-artifacts
      - name: Publish distribution 📦 to PyPI
        if: startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
